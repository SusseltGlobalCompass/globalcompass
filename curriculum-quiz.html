.hero-p{font-size:13px;color:#A8C4F5;max-width:480px;margin:0 auto;line-height:1.65;position:relative;z-index:1}

.wrap{max-width:600px;margin:0 auto;padding:28px 20px 60px}

.prog-wrap{margin-bottom:24px}
.prog-bar{background:#E0E8F5;border-radius:99px;height:5px;margin-bottom:6px}

.btn-row{display:flex;justify-content:space-between;align-items:center;gap:12px}

  const area = document.getElementById('quiz-area');
  if(current >= total){ showResult(); return; }
  const q = questions[current];
  const pct = Math.round((current / total) * 100);

  area.innerHTML = `
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:${pct}%"></div></div>
      <div class="prog-label"><span>Question ${current+1} of ${total}</span><span>${pct}% complete</span></div>
    </div>
    <div class="q-card">
      <div class="q-cat"><i class="ti ${q.icon}" style="font-size:11px"></i>${q.cat}</div>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts-wrap">
        ${q.opts.map((o,i)=>`
          <button class="opt${answers[current]===i?' selected':''}" onclick="pick(${i})">
            <div class="opt-dot"></div>
            <span>${o.t}</span>
          </button>`).join('')}
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-back" onclick="goBack()" ${current===0?'disabled':''}>← Back</button>
      <button class="btn-next" id="btn-next" onclick="goNext()" ${answers[current]===undefined?'disabled':''}>
        ${current===total-1?'See my result':'Next'} <i class="ti ti-arrow-right"></i>
      </button>
    </div>`;
}

function pick(i){
  answers[current] = i;
  document.querySelectorAll('.opt').forEach((b,idx)=>{
    b.classList.toggle('selected', idx===i);
  });
  document.getElementById('btn-next').disabled = false;
}

function goNext(){ if(answers[current]!==undefined){ current++; render(); } }
function goBack(){ if(current>0){ current--; render(); } }

function showResult(){
  const scores = {};
  Object.keys(curricula).forEach(k=>scores[k]=0);
  questions.forEach((q,qi)=>{
    const picked = answers[qi];
    if(picked!==undefined){
      const vals = q.opts[picked].v;
      Object.keys(vals).forEach(k=>{ if(scores[k]!==undefined) scores[k]+=vals[k]; });
    }
  });

  // Max possible per curriculum
  const maxScores = {};
  Object.keys(curricula).forEach(k=>maxScores[k]=0);
  questions.forEach(q=>{
    Object.keys(curricula).forEach(k=>{
      const best = Math.max(...q.opts.map(o=>o.v[k]||0));
      maxScores[k] += best;
    });
  });

  const sorted = Object.keys(scores).sort((a,b)=>scores[b]-scores[a]);
  const top = sorted[0];
  const others = sorted.slice(1,5);
  const topPct = Math.round((scores[top]/maxScores[top])*100);
  const c = curricula[top];

  const area = document.getElementById('quiz-area');
  area.innerHTML = `
    <div class="result-card">
      <div class="result-hero">
        <div class="result-eyebrow">Your best curriculum match</div>
        <div class="result-name">${c.name}</div>
        <div class="result-tagline">${c.tagline}</div>
        <div class="result-score">
          <div class="score-bar-wrap"><div class="score-bar" id="sbar" style="width:0%"></div></div>
          <div class="score-pct">${topPct}%</div>
        </div>
      </div>
      <div class="result-body">
        <div class="traits-grid">
          ${c.traits.map(t=>`<div class="trait-box"><div class="trait-label">${t.l}</div><div class="trait-val">${t.v}</div></div>`).join('')}
        </div>
        <div class="result-cta">
          <a class="btn-cta-primary" href="${c.guide}"><i class="ti ti-book"></i> Read the ${c.name.split('(')[0].trim()} guide</a>
          <a class="btn-cta-secondary" href="${c.nav}"><i class="ti ti-compass"></i> Open the navigator</a>
        </div>
      </div>
    </div>
    <div class="other-matches">
      <div class="other-title">Other strong matches for your family</div>
      <div class="other-grid">
        ${others.map(k=>`<div class="other-chip">${curricula[k].name.split('(')[0].trim()} <span>${Math.round((scores[k]/maxScores[k])*100)}%</span></div>`).join('')}
      </div>
    </div>
    <div style="background:#FFF8E8;border:0.5px solid rgba(245,200,66,0.4);border-radius:12px;padding:14px 18px;margin-top:14px">
      <div style="font-size:10px;font-weight:700;color:#8a6a14;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px">📍 A note for families in the UAE and Gulf</div>
      <div style="font-size:12.5px;color:#6b5410;line-height:1.65">All private schools in the UAE include <strong>Arabic Language, Islamic Education, and UAE Social Studies</strong> as mandatory subjects — regardless of which international curriculum the school follows. Your curriculum choice does not affect these. Emirati and Arab students study Arabic as a first language (Arabic A); other students study it as an additional language (Arabic B). Every private school is regulated by KHDA (Dubai), ADEK (Abu Dhabi), or SPEA (Sharjah) and inspected against the UAE Unified Inspection Framework.</div>
    </div>
    <div class="retake-row">
      <button class="btn-retake" onclick="retake()">Retake the quiz with different answers</button>
      <div style="margin-top:12px"><a href="index.html" style="font-size:13px;color:#1B3A7A;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:5px"><i class="ti ti-arrow-left" style="font-size:13px"></i> Back to GlobalCompass</a></div>
    </div>`;

  setTimeout(()=>{ const bar=document.getElementById('sbar'); if(bar) bar.style.width=topPct+'%'; }, 100);
}

function retake(){ current=0; answers={}; render(); }
render();
</script>
</body>
</html>
