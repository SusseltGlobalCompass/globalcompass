<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalCompass — Search Schools</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F8F9FF;color:#0D1F4A}
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#1B3A7A;flex-wrap:wrap;gap:10px}
.nav-logo{display:flex;align-items:center;gap:10px}
.wm-wrap{display:flex;flex-direction:column}
.wm-global-row{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.wm-rule{height:0.7px;background:rgba(245,200,66,0.5);flex:1}
.wm-global{font-family:'Montserrat',sans-serif;font-size:7px;font-weight:300;color:#fff;letter-spacing:0.3em;text-transform:uppercase}
.wm-compass{font-family:'Montserrat',sans-serif;font-size:14px;font-weight:800;color:#fff;letter-spacing:0.07em;text-transform:uppercase;line-height:1}
.wm-compass .o{color:#F5C842}
.nav-right{display:flex;align-items:center;gap:14px}
.nav-back{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;color:#A8C4F5;text-decoration:none;display:flex;align-items:center;gap:4px}
.nav-tag{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;color:#F5C842;letter-spacing:0.12em;text-transform:uppercase;background:rgba(245,200,66,0.12);padding:4px 12px;border-radius:99px;border:0.5px solid rgba(245,200,66,0.3)}
.hero-bar{background:linear-gradient(135deg,#0D1F4A,#1B3A7A);padding:32px 24px;text-align:center}
.hero-h{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;color:#fff;margin-bottom:8px}
.hero-p{font-size:13px;color:#A8C4F5;max-width:540px;margin:0 auto;font-weight:300;line-height:1.6}
.main{max-width:1100px;margin:0 auto;padding:0 24px 60px}
.filter-card{max-width:100%;margin:-26px auto 28px;background:#fff;border:2px solid #F5C842;border-radius:18px;padding:18px 22px;box-shadow:0 0 28px rgba(245,200,66,0.25);position:relative;z-index:2}
.f-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.f-row input{flex:1 1 200px;min-width:160px;border:none;background:transparent;font-size:14px;color:#0D1F4A;outline:none;font-family:'Inter',sans-serif}
.f-row input::placeholder{color:#9AB0D0}
.f-div{width:1px;height:20px;background:#C0D0E8;flex-shrink:0}
.f-sel{background:transparent;border:none;font-size:12px;color:#1B3A7A;outline:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600}
.f-btn{background:#1B3A7A;color:#F5C842;border:none;padding:10px 24px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Montserrat',sans-serif;flex-shrink:0}
.results-meta{font-size:12.5px;color:#7A8BAE;margin-bottom:16px;font-weight:600}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media (max-width:760px){.results-grid{grid-template-columns:1fr}}
.school-card{background:#fff;border:0.5px solid #E0E8F5;border-radius:14px;padding:20px}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px}
.sc-name{font-family:'Playfair Display',serif;font-size:17px;color:#0D1F4A}
.sc-loc{font-size:11.5px;color:#7A8BAE;margin-top:2px}
.sc-khda{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;color:#fff;padding:3px 8px;border-radius:99px;letter-spacing:0.04em;white-space:nowrap}
.sc-badge{font-size:9.5px;font-weight:700;color:#1B3A7A;background:rgba(245,200,66,0.18);padding:3px 10px;border-radius:99px;white-space:nowrap;text-transform:uppercase;letter-spacing:0.03em}
.sc-tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.sc-tag{font-size:10.5px;padding:4px 10px;border-radius:99px;background:#F8F9FF;border:0.5px solid #E0E8F5;color:#3A4A6B;font-weight:600}
.sc-desc{font-size:12.5px;line-height:1.6;color:#3A4A6B;margin-bottom:10px}
.sc-link{font-size:11.5px;color:#1B3A7A;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.empty-state{text-align:center;padding:60px 20px;color:#7A8BAE}
.empty-state i{font-size:36px;color:#C0D0E8;margin-bottom:12px;display:block}
.loading-state{text-align:center;padding:60px 20px;color:#7A8BAE;font-size:13px}
.sc-compare{display:flex;align-items:center;gap:6px;margin-top:12px;padding-top:12px;border-top:0.5px solid #E0E8F5;font-size:11.5px;color:#1B3A7A;font-weight:600;cursor:pointer}
.sc-compare input{cursor:pointer;width:15px;height:15px;accent-color:#1B3A7A}
.compare-bar{position:fixed;bottom:0;left:0;right:0;background:#1B3A7A;padding:14px 24px;display:none;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(0,0,0,0.15);z-index:50}
.compare-chip{background:rgba(245,200,66,0.15);color:#fff;font-size:12px;font-weight:600;padding:6px 12px;border-radius:99px;display:inline-flex;align-items:center;gap:6px}
.compare-chip i{cursor:pointer;color:#F5C842}
.compare-btn{background:#F5C842;color:#1B3A7A;border:none;padding:10px 24px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Montserrat',sans-serif;white-space:nowrap}
.compare-btn:disabled{background:rgba(245,200,66,0.3);color:rgba(27,58,122,0.5);cursor:not-allowed}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3NTW0BH2C0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3NTW0BH2C0');
</script>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">
    <svg width="26" height="26" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="29" stroke="#F5C842" stroke-width="1.4" fill="none"/>
      <ellipse cx="32" cy="32" rx="16" ry="29" stroke="#F5C842" stroke-width="0.8" fill="none" opacity="0.45"/>
      <ellipse cx="32" cy="32" rx="29" ry="12" stroke="#F5C842" stroke-width="0.8" fill="none" opacity="0.45"/>
      <circle cx="32" cy="32" r="3" fill="#F5C842"/>
      <polygon points="32,4 35,25 32,26.5 29,25" fill="#F5C842"/>
    </svg>
    <div class="wm-wrap">
      <div class="wm-global-row"><div class="wm-rule"></div><div class="wm-global">GLOBAL</div><div class="wm-rule"></div></div>
      <div class="wm-compass">C<span class="o">O</span>MPASS</div>
    </div>
  </div>
  <div class="nav-right">
    <a class="nav-back" href="index.html"><i class="ti ti-arrow-left"></i> Back to GlobalCompass</a>
    <div class="nav-tag">School Search</div>
  </div>
</nav>

<div class="hero-bar">
  <h1 class="hero-h">Find the right school</h1>
  <p class="hero-p">Search real schools by location, age, curriculum, and budget — no rankings, no sponsored placements, just facts to help you decide.</p>
</div>

<div class="main">
  <div class="filter-card">
    <div class="f-row">
      <i class="ti ti-search" style="color:#1B3A7A;font-size:16px;flex-shrink:0"></i>
      <input id="qInput" placeholder="School, country, or city...">
      <div class="f-div"></div>
      <select id="ageSel" class="f-sel" onchange="setCurriculumOptionSet(this.value==='3-5')"><option value="">All ages</option><option value="3-5">3-5 Pre-school</option><option value="6-11">6-11 Primary</option><option value="12-15">12-15 Middle</option><option value="16-18">16-18 Final years</option></select>
      <div class="f-div"></div>
      <select id="curSel" class="f-sel" onchange="document.getElementById('curSel').dataset.userTouched='1'"><option value="">All curricula</option><option value="IB">IB</option><option value="British">British</option><option value="American">American</option><option value="CBSE">CBSE</option><option value="French">French</option><option value="German">German</option><option value="Singapore">Singapore</option><option value="Australian">Australian</option><option value="Brazilian">Brazilian</option><option value="International">International Schools</option></select>
      <div class="f-div"></div>
      <select id="budgetSel" class="f-sel"><option value="">All budgets</option><option value="0-3000">Budget-friendly</option><option value="3000-6000">Mid-range</option><option value="6000-10000">Premium</option><option value="10000-999999">Ultra-premium</option></select>
      <button class="f-btn" onclick="runSearch()">Search</button>
    </div>
  </div>

  <div id="resultsMeta" class="results-meta"></div>
  <div id="resultsArea"><div class="loading-state">Loading schools...</div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://qginevdbqaodimcllevb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_q3hvHIL8bl4oH49Qkyqkgg_w1G2Ud5w";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let compareSelection = [];

function toggleCompare(id, checkbox){
  const card = checkbox.closest(".school-card");
  const name = card.querySelector(".sc-name").textContent;
  if(checkbox.checked){
    if(compareSelection.length >= 2){
      checkbox.checked = false;
      alert("You can compare up to 2 schools at a time. Remove one first.");
      return;
    }
    compareSelection.push({ id, name });
  } else {
    compareSelection = compareSelection.filter(s => s.id !== id);
  }
  updateCompareBar();
}

function removeFromCompare(id){
  compareSelection = compareSelection.filter(s => s.id !== id);
  const checkbox = document.querySelector('input[data-compare-id="'+id+'"]');
  if(checkbox) checkbox.checked = false;
  updateCompareBar();
}

function updateCompareBar(){
  const bar = document.getElementById("compareBar");
  const btn = document.getElementById("compareBtn");
  if(compareSelection.length === 0){
    bar.style.display = "none";
    return;
  }
  bar.style.display = "flex";
  document.getElementById("compareChips").innerHTML = compareSelection.map(s =>
    '<span class="compare-chip">'+s.name+' <i class="ti ti-x" onclick="removeFromCompare(\''+s.id+'\')"></i></span>'
  ).join("");
  if(compareSelection.length === 2){
    btn.disabled = false;
    btn.textContent = "Compare these 2 schools";
  } else {
    btn.disabled = true;
    btn.textContent = "Select 1 more to compare";
  }
}

function goToCompare(){
  if(compareSelection.length !== 2) return;
  window.location.href = "compare.html?a="+compareSelection[0].id+"&b="+compareSelection[1].id;
}

function getParams(){
  const p = new URLSearchParams(window.location.search);
  return { q: p.get("q")||"", age: p.get("age")||"", cur: p.get("cur")||"", budget: p.get("budget")||"", type: p.get("type")||"", featured: p.get("featured")||"" };
}

const K12_CURRICULA = '<option value="">All curricula</option><option value="IB">IB</option><option value="British">British</option><option value="American">American</option><option value="CBSE">CBSE</option><option value="French">French</option><option value="German">German</option><option value="Singapore">Singapore</option><option value="Australian">Australian</option><option value="Brazilian">Brazilian</option><option value="International">International Schools</option>';
const NURSERY_PHILOSOPHIES = '<option value="">All philosophies</option><option value="Montessori">Montessori</option><option value="British EYFS">British EYFS</option><option value="Reggio Emilia">Reggio Emilia</option><option value="Forest School">Forest School</option>';

function setCurriculumOptionSet(isNursery, preserveValue){
  const sel = document.getElementById("curSel");
  const current = preserveValue !== undefined ? preserveValue : sel.value;
  sel.innerHTML = isNursery ? NURSERY_PHILOSOPHIES : K12_CURRICULA;
  sel.value = current || "";
}

function applyParamsToUI(params){
  document.getElementById("qInput").value = params.q;
  const isNursery = (params.type === "Nursery") || (params.age === "3-5");
  setCurriculumOptionSet(isNursery, params.cur);
  if(params.age) document.getElementById("ageSel").value = params.age;
  if(params.budget) document.getElementById("budgetSel").value = params.budget;
}

async function resolveCountryIds(q){
  if(!q) return [];
  const synonyms = {"uae":"United Arab Emirates","u.a.e":"United Arab Emirates","usa":"United States","us":"United States","u.s.a":"United States","u.s":"United States","uk":"United Kingdom","u.k":"United Kingdom"};
  const key = q.toLowerCase().trim();
  const lookupTerm = synonyms[key] || q;
  const { data } = await sb.from("countries").select("id").ilike("name", "%"+lookupTerm+"%");
  return data ? data.map(c => c.id) : [];
}

async function runSearch(){
  const q = document.getElementById("qInput").value.trim();
  const age = document.getElementById("ageSel").value;
  const cur = document.getElementById("curSel").value;
  const budget = document.getElementById("budgetSel").value;

  const newUrl = window.location.pathname + "?q=" + encodeURIComponent(q) + "&age=" + age + "&cur=" + cur + "&budget=" + budget;
  window.history.replaceState({}, "", newUrl);

  document.getElementById("resultsArea").innerHTML = '<div class="loading-state">Searching...</div>';

  let query = sb.from("schools").select("*, countries(name)");

  if(q){
    const countryIds = await resolveCountryIds(q);
    let orParts = ["name.ilike.%"+q+"%","city.ilike.%"+q+"%"];
    if(countryIds.length){
      orParts.push("country_id.in.("+countryIds.join(",")+")");
    }
    query = query.or(orParts.join(","));
  }
  if(cur){
    query = query.ilike("curriculum", "%"+cur+"%");
  }
  if(age){
    const [aMin,aMax] = age.split("-").map(Number);
    query = query.lte("age_min", aMax).gte("age_max", aMin);
  }
  if(budget){
    const [bMin,bMax] = budget.split("-").map(Number);
    query = query.lte("fee_min", bMax).gte("fee_max", bMin);
  }
  const typeParam = getParams().type;
  if(typeParam){
    query = query.ilike("school_type", "%"+typeParam+"%");
  }
  if(getParams().featured === "1"){
    query = query.eq("is_spotlight", true);
  }

  query = query.order("is_featured", { ascending:false }).order("rating", { ascending:false, nullsFirst:false }).order("name", { ascending:true });

  const { data, error } = await query;

  if(error){
    document.getElementById("resultsArea").innerHTML = '<div class="empty-state"><i class="ti ti-alert-circle"></i>Something went wrong loading results. Please try again.</div>';
    console.error(error);
    return;
  }

  renderResults(data || []);
}

function renderResults(schools){
  const metaEl = document.getElementById("resultsMeta");
  const areaEl = document.getElementById("resultsArea");

  if(schools.length === 0){
    metaEl.textContent = "";
    areaEl.innerHTML = '<div class="empty-state"><i class="ti ti-school-off"></i>We are just getting started building out our school directory. Try removing a filter, or check back soon as we add more schools every week.</div>';
    return;
  }

  metaEl.textContent = "Showing " + schools.length + " school" + (schools.length===1?"":"s");

  areaEl.innerHTML = '<div class="results-grid">' + schools.map(s => {
    const country = s.countries ? s.countries.name : "";
    const loc = [s.city, country].filter(Boolean).join(", ");
    const ageRange = (s.age_min!=null && s.age_max!=null) ? ("Ages "+s.age_min+"-"+s.age_max) : "";
    const feeRange = (s.fee_min!=null && s.fee_max!=null) ? (s.fee_currency||"AED")+" "+s.fee_min.toLocaleString()+"-"+s.fee_max.toLocaleString()+(s.fee_label?(" "+s.fee_label):"/month") : "";
    const badge = s.school_type || "School";
    const khda = s.khda_rating || "";
    const khdaColour = khda === "Outstanding" ? "#1A4D1A" : khda === "Very Good" ? "#2D1B6E" : khda === "Good" ? "#8B6000" : khda === "Acceptable" ? "#8B3A00" : "#555";
    const khdaBadge = khda ? '<span class="sc-khda" style="background:'+khdaColour+'">⭐ KHDA: '+khda+'</span>' : "";
    const desc = s.description || "";
    const website = s.website ? '<a class="sc-link" href="'+s.website+'" target="_blank" rel="noopener">Visit website <i class="ti ti-external-link"></i></a>' : "";
    const isChecked = compareSelection.find(c => c.id === s.id) ? "checked" : "";
    return '<div class="school-card">'
      + '<div class="sc-top"><div><div class="sc-name">'+s.name+'</div><div class="sc-loc">'+loc+'</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><span class="sc-badge">'+badge+'</span>'+khdaBadge+'</div></div>'
      + '<div class="sc-tags">'
      + (s.curriculum ? '<span class="sc-tag">'+s.curriculum+'</span>' : "")
      + (ageRange ? '<span class="sc-tag">'+ageRange+'</span>' : "")
      + (feeRange ? '<span class="sc-tag">'+feeRange+'</span>' : "")
      + '</div>'
      + (desc ? '<div class="sc-desc">'+desc+'</div>' : "")
      + website
      + '<label class="sc-compare"><input type="checkbox" data-compare-id="'+s.id+'" '+isChecked+' onchange="toggleCompare(\''+s.id+'\', this)"> Add to Compare</label>'
      + '</div>';
  }).join("") + '</div>';
}

const initialParams = getParams();
applyParamsToUI(initialParams);
runSearch();
</script>
<div class="compare-bar" id="compareBar">
  <div id="compareChips" style="display:flex;gap:8px;flex-wrap:wrap"></div>
  <button class="compare-btn" id="compareBtn" disabled onclick="goToCompare()">Select 1 more to compare</button>
</div>
</body>
</html>
